<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script type="module" src="script.js" defer></script>
    <title>Version 1</title>
</head>
<body>
    <div id="terminal">
 
        <!-- top bar -->
        <header id="top-bar">
            <span id="agency-name">BFC SECURE TERMINAL</span>
            <span class="divider">//</span>
            <span id="case-id">CASE FILE TSO-2089-001</span>
         
        </header>
 
        <!-- main -->
        <main id="main-panel">
 
            <!-- 3D -->
            <section id="viewer-panel">
                <div id="viewer-label">3D ARTIFACT VIEWER</div>
                <div id="viewer-hint">ROTATE / ZOOM ENABLED</div>
                <canvas id="three-canvas"></canvas>
            </section>
 
            <!-- bottom: desc + data -->
            <div id="bottom-row">
 
                <section id="description-panel">
                    <div class="panel-label">ARTIFACT DESCRIPTION</div>
                    <div class="panel-content" id="description-text"></div>
                </section>
 
                <section id="intelligence-panel">
                    <div class="panel-label">CURRENT INTELLIGENCE</div>
                    <div class="panel-content" id="intelligence-text"></div>
                </section>
 
            </div>
 
        </main>
 
        <!-- nav -->
        <nav id="nav-bar">
            <button id="btn-prev">&lt; PREV ITEM</button>
            <span id="item-counter">ITEM <span id="item-current">1</span> OF <span id="item-total">5</span></span>
            <button id="btn-next">NEXT ITEM &gt;</button>
        </nav>
 
    </div>

</body>
</html>
