<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 3: Library Liberty</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="cinemabar">
        <img src="images/cinemabar.png" alt="">
      </div>
     

      <div id="scroll-wrapper">
    
        <div id="track-container">
     

          <div id="track">
     
                            <!-- SCENE 1: wolf enters, hears oinks -->
                            <div class="scene" id="scene1">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="sun" src="images/sun.png" alt="">
                                <img class="cloud" id="cloud1" src="images/cloud1.png" alt="">
                                <img class="cloud" id="cloud2" src="images/cloud2.png" alt="">
                                <div id="scene1-wolf" class="char-container"></div>
                            </div>
             
                            <!-- SCENE 2: 3 houses, piggies playing outside, wolf creeps in -->
                            <div class="scene" id="scene2">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="sun" src="images/sun.png" alt="">
                                <img class="cloud" id="cloud3" src="images/cloud3.png" alt="">
                                <img class="cloud" id="cloud4" src="images/cloud4.png" alt="">
         
                                <img class="house" id="s2-strawhome"  src="images/objects/strawhome.svg"  alt="straw house">
                                <img class="house" id="s2-stickhouse" src="images/objects/stickhouse.svg" alt="stick house">
                                <img class="house" id="s2-brickhouse" src="images/objects/brickhouse.svg" alt="brick house">
    
                                <div id="scene2-wolf" class="char-container"></div>
                                <div id="scene2-pig1" class="char-container"></div>
                                <div id="scene2-pig2" class="char-container"></div>
                                <div id="scene2-pig3" class="char-container"></div>
                            </div>
             
                            <!-- SCENE 3: piggies panic, run into houses, wolf in distance -->
                            <div class="scene" id="scene3">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="cloud" id="cloud5" src="images/cloud5.png" alt="">
                                <img class="house" id="s3-strawhome"  src="images/objects/strawhome.svg"  alt="straw house">
                                <img class="house" id="s3-stickhouse" src="images/objects/stickhouse.svg" alt="stick house">
                                <img class="house" id="s3-brickhouse" src="images/objects/brickhouse.svg" alt="brick house">
                                <div id="scene3-wolf" class="char-container"></div>
                                <div id="scene3-pig1" class="char-container"></div>
                                <div id="scene3-pig2" class="char-container"></div>
                                <div id="scene3-pig3" class="char-container"></div>
                            </div>
             
                            <!-- SCENE 4: wolf blows straw house, drag pig1 to wolf -->
                            <div class="scene" id="scene4">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="cloud" id="cloud6" src="images/cloud6.png" alt="">
                                <img class="house" id="s4-strawhome" src="images/objects/strawhome.svg" alt="straw house">
                                <div id="scene4-wolf" class="char-container"></div>
                                <div id="scene4-pig1" class="char-container draggable-pig"></div>
                                <div id="drag-prompt4" class="drag-prompt">Drag the piggy to the wolf!</div>
                            </div>
             
                            <!-- SCENE 5: wolf blows stick house twice, drag pig2 to wolf -->
                            <div class="scene" id="scene5">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="cloud" id="cloud1b" src="images/cloud1.png" alt="">
                                <img class="house" id="s5-stickhouse" src="images/objects/stickhouse.svg" alt="stick house">
                                <div id="scene5-wolf" class="char-container"></div>
                                <div id="scene5-pig2" class="char-container draggable-pig"></div>
                                <div id="drag-prompt5" class="drag-prompt">Drag the piggy to the wolf!</div>
                            </div>
             
                            <!-- SCENE 6: wolf fails to blow brick house -->
                            <div class="scene" id="scene6">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="cloud" id="cloud2b" src="images/cloud2.png" alt="">
                                <img class="house" id="s6-brickhouse" src="images/objects/brickhouse.svg" alt="brick house">
                                <div id="scene6-wolf" class="char-container"></div>
                                <div id="scene6-pig3" class="char-container"></div>
                            </div>
             
                            <!-- SCENE 7: wolf brings cannon, viewer fires, eats pig3 -->
                            <div class="scene" id="scene7">
                                <img class="bg" src="images/background.png" alt="">
                                <img class="cloud" id="cloud3b" src="images/cloud3.png" alt="">
                                <img class="house"  id="s7-brickhouse" src="images/objects/brickhouse.svg" alt="brick house">
                                <img class="prop"   id="cannon"         src="images/objects/cannon.svg"      alt="cannon">
                             
                                <img class="prop"   id="cannonball-svg" src="images/objects/cannonball.svg"  alt="cannonball">
                                <div id="scene7-wolf" class="char-container"></div>
                                <div id="scene7-pig3" class="char-container draggable-pig"></div>
                                <button id="fire-btn">Fire!</button>
                                <div id="drag-prompt7" class="drag-prompt">Drag the piggy to the wolf!</div>
                            </div>
            
     
          </div>
        </div>
      </div>
    
      <script src="minified/gsap.min.js"></script>
      <script src="minified/ScrollTrigger.min.js"></script>
      <script src="minified/Draggable.min.js"></script>
      <script src="script.js"></script>
</body>
<footer>
    <a href="https://gsap.com/docs/v3/Plugins/ScrollTrigger/">ScrollTrigger GSAP</a>
    <a href="https://gsap.com/docs/v3/Plugins/Draggable/">Draggable GSAP</a>
</footer>

  
</html>
